<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Groundwork system architecture</title>
<desc>A structural diagram showing Groundwork's multi-agent pipeline including the Streamlit UI, Research mode with LangGraph, Document mode with RAG, shared report generation with synthesis and judge agents, and export layer.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: Arial, sans-serif; fill: #222; }
  .th { font-size: 13px; font-weight: 600; fill: #111; }
  .ts { font-size: 11px; fill: #555; }
  .arr { stroke: #888; stroke-width: 1.2; fill: none; }
  .gray { fill: #f4f4f2; stroke: #bbb; }
  .purple { fill: #EEEDFE; stroke: #534AB7; }
  .teal { fill: #E1F5EE; stroke: #0F6E56; }
  .blue { fill: #E6F1FB; stroke: #185FA5; }
  .coral { fill: #FAECE7; stroke: #993C1D; }
  .amber { fill: #FAEEDA; stroke: #854F0B; }
</style>
</defs>

<!-- USER -->
<rect class="gray" x="270" y="16" width="140" height="38" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="39" text-anchor="middle">User</text>

<line x1="340" y1="54" x2="340" y2="78" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- STREAMLIT UI -->
<rect class="purple" x="180" y="78" width="320" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="96" text-anchor="middle">Streamlit UI</text>
<text class="ts" x="340" y="112" text-anchor="middle">app.py — mode toggle, session state, report display</text>

<line x1="260" y1="120" x2="200" y2="158" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="420" y1="120" x2="480" y2="158" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- RESEARCH MODE -->
<rect class="teal" x="30" y="158" width="300" height="240" rx="12" stroke-width="0.5"/>
<text class="th" x="180" y="180" text-anchor="middle">Research mode (LangGraph)</text>

<rect class="gray" x="52" y="196" width="256" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="180" y="211" text-anchor="middle">route_followup_node</text>
<text class="ts" x="180" y="225" text-anchor="middle">Answer from context or new search?</text>

<rect class="gray" x="52" y="244" width="116" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="110" y="259" text-anchor="middle">answer_from_notes</text>
<text class="ts" x="110" y="273" text-anchor="middle">No search needed</text>

<rect class="gray" x="192" y="244" width="116" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="250" y="259" text-anchor="middle">search_node</text>
<text class="ts" x="250" y="273" text-anchor="middle">SerpAPI web search</text>

<rect class="gray" x="52" y="296" width="256" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="180" y="311" text-anchor="middle">analyse_node</text>
<text class="ts" x="180" y="325" text-anchor="middle">Claude Haiku — gap analysis + synthesis</text>

<line x1="180" y1="232" x2="110" y2="244" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="180" y1="232" x2="250" y2="244" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="250" y1="280" x2="250" y2="290" stroke="#888" stroke-width="1.2"/>
<line x1="250" y1="290" x2="180" y2="296" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- DOCUMENT MODE -->
<rect class="blue" x="350" y="158" width="300" height="240" rx="12" stroke-width="0.5"/>
<text class="th" x="500" y="180" text-anchor="middle">Document mode (RAG)</text>

<rect class="gray" x="372" y="196" width="256" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="500" y="211" text-anchor="middle">ingest_document</text>
<text class="ts" x="500" y="225" text-anchor="middle">Chunk, embed, store in ChromaDB</text>

<rect class="gray" x="372" y="248" width="116" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="430" y="263" text-anchor="middle">ChromaDB</text>
<text class="ts" x="430" y="277" text-anchor="middle">Vector store</text>

<rect class="gray" x="512" y="248" width="116" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="570" y="263" text-anchor="middle">rag_node</text>
<text class="ts" x="570" y="277" text-anchor="middle">Retrieve + answer</text>

<rect class="gray" x="372" y="300" width="256" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="500" y="315" text-anchor="middle">sentence-transformers</text>
<text class="ts" x="500" y="329" text-anchor="middle">Local embeddings — no API cost</text>

<line x1="500" y1="232" x2="430" y2="248" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="500" y1="232" x2="570" y2="248" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="430" y1="284" x2="430" y2="294" stroke="#888" stroke-width="1.2"/>
<line x1="430" y1="294" x2="500" y2="300" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Arrows to Report Gen -->
<line x1="180" y1="398" x2="260" y2="444" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="500" y1="398" x2="420" y2="444" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- REPORT GENERATION -->
<rect class="coral" x="100" y="444" width="480" height="200" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="466" text-anchor="middle">Report generation (per mode, independently)</text>

<rect class="gray" x="120" y="482" width="200" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="220" y="498" text-anchor="middle">synthesis_node</text>
<text class="ts" x="220" y="514" text-anchor="middle">Claude Sonnet — report writing</text>

<rect class="gray" x="360" y="482" width="200" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="460" y="498" text-anchor="middle">judge_node</text>
<text class="ts" x="460" y="514" text-anchor="middle">GPT-4o-mini — quality scoring</text>

<line x1="320" y1="502" x2="360" y2="502" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect class="gray" x="120" y="542" width="440" height="38" rx="6" stroke-width="0.5"/>
<text class="th" x="340" y="557" text-anchor="middle">Regeneration loop</text>
<text class="ts" x="340" y="572" text-anchor="middle">Capped at 1 — targets weakest scoring dimension</text>

<line x1="220" y1="522" x2="220" y2="542" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="460" y1="522" x2="460" y2="536" stroke="#888" stroke-width="1.2"/>
<line x1="460" y1="536" x2="340" y2="542" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Arrow to Export -->
<line x1="340" y1="644" x2="340" y2="674" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- EXPORT -->
<rect class="amber" x="100" y="674" width="480" height="118" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="696" text-anchor="middle">Export</text>

<rect class="gray" x="120" y="712" width="200" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="220" y="728" text-anchor="middle">export_to_docx</text>
<text class="ts" x="220" y="744" text-anchor="middle">Node.js docx package</text>

<rect class="gray" x="360" y="712" width="200" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="460" y="728" text-anchor="middle">export_to_pptx</text>
<text class="ts" x="460" y="744" text-anchor="middle">Node.js pptxgenjs + Claude planning</text>

<!-- LangSmith sidebar -->
<rect class="gray" x="30" y="674" width="56" height="118" rx="8" stroke-width="0.5"/>
<text class="ts" x="58" y="734" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 58 734)">LangSmith tracing</text>
<line x1="86" y1="700" x2="100" y2="700" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="86" y1="760" x2="100" y2="760" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3 3"/>

</svg>
